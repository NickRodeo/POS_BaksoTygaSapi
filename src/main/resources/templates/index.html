<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS Bakso Tyga Sapi - Kasir</title>
    <meta th:name="_csrf" th:content="${_csrf.token}" />
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}" />
    <link rel="stylesheet" th:href="@{/css/index.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/navbar :: app-navbar('menu')}"></div>

    <main class="main-container">
      <section class="menu-section">
        <h2>Daftar Menu</h2>

        <!-- FITUR BARU: Search Bar Input Real-Time -->
        <!-- KODE BARU: Search Container dengan SVG Kaca Pembesar -->
        <div class="search-container">
          <svg
            class="search-icon-svg"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            type="text"
            id="searchMenuInput"
            placeholder="Cari menu bakso atau minuman..."
            oninput="filterMenu()"
          />
        </div>

        <div class="menu-grid">
          <!-- LOOP DATA DARI DATABASE LEWAT JAVA OBJECT -->
          <div
            class="menu-card"
            th:each="menu : ${daftarMenu}"
            th:classappend="${menu.stok == 0} ? 'out-of-stock' : ''"
          >
            <!-- PBO: Mengakses properti objek via Thymeleaf expressions -->
            <img
              th:src="@{/img/{gambar}(gambar=${menu.gambar != null ? menu.gambar : 'default.jpg'})}"
              alt="Menu"
              class="menu-img"
            />
            <div class="menu-info">
              <!-- FITUR BARU: Menambahkan class="menu-title" untuk target filter JS -->
              <h3 class="menu-title" th:text="${menu.nama}">Nama Menu</h3>
              <!-- Atribut data-* disematkan untuk dibaca oleh JavaScript -->
              <p
                class="harga"
                th:data-price="${menu.harga}"
                th:text="'Rp ' + ${#numbers.formatInteger(menu.harga, 3, 'POINT')}"
              >
                Rp 0
              </p>
              <p class="stok" th:text="'Stok: ' + ${menu.stok}">Stok: 0</p>
            </div>
            <!-- Mengirimkan argumen nama dan harga ke fungsi JS saat diklik -->
            <button
              class="btn-tambah"
              th:disabled="${menu.stok == 0}"
              th:onclick="tambahKeKeranjang([[${menu.nama}]], [[${menu.harga}]])"
            >
              <span th:text="${menu.stok == 0} ? 'Habis' : '+ Tambah'"
                >+ Tambah</span
              >
            </button>
          </div>
        </div>
      </section>

      <!-- Awalnya ditambahkan class hidden jika data keranjang masih kosong -->
      <section class="cart-section hidden" id="cartSection">
        <h2>Pesanan Saat Ini</h2>

        <!-- Wadah kosong, nanti diisi secara interaktif oleh script.js -->
        <div class="cart-items" id="cartItems"></div>

        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotalPrice">Rp 0</span>
          </div>
          <div class="summary-row total">
            <span><strong>Total Bayar</strong></span>
            <span><strong id="totalPrice">Rp 0</strong></span>
          </div>
        </div>

        <div class="cart-actions">
          <button class="btn-batal" onclick="batalSemuaPesanan()">Batal</button>
          <button class="btn-bayar" onclick="prosesPembayaran()">
            Proses Bayar
          </button>
        </div>
      </section>
    </main>
    <!-- ================= MODAL INPUT TUNAI MODERN ================= -->
    <div id="modalBayar" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>Selesaikan Pembayaran</h3>
        <hr />
        <div class="modal-row">
          <span>Total Tagihan:</span>
          <strong id="modalTotalTagihan" class="text-primary">Rp 0</strong>
        </div>

        <div class="modal-input-group">
          <label for="inputUangTunai">Uang Tunai Diterima</label>
          <div class="input-wrapper">
            <span class="currency-prefix">Rp</span>
            <input
              type="number"
              id="inputUangTunai"
              placeholder="0"
              min="0"
              oninput="hitungKembalianOtomatis()"
            />
          </div>
        </div>

        <div class="modal-row">
          <span>Kembalian:</span>
          <span id="modalKembalian" class="text-success">Rp 0</span>
        </div>

        <div class="modal-actions">
          <button class="btn-secondary" onclick="tutupModalBayar()">
            Batal
          </button>
          <button
            id="btnKonfirmasiBayar"
            class="btn-primary"
            onclick="eksekusiPembayaranKeServer()"
          >
            Konfirmasi & Cetak
          </button>
        </div>
      </div>
    </div>

    <!-- ================= WADAH NOTIFIKASI TOAST ================= -->
    <div id="toastContainer" class="toast-container"></div>
    <script th:src="@{/js/index.js}"></script>
  </body>
</html>
