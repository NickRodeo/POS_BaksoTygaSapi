<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Halaman Tidak Ditemukan - POS Bakso Tyga Sapi</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
        text-align: center;
        padding: 100px 20px;
      }
      .error-container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      h1 {
        font-size: 72px;
        margin: 0;
        color: #ef4444;
      }
      p {
        color: #64748b;
        font-size: 16px;
        margin: 10px 0 24px 0;
      }
      .btn-kembali {
        display: inline-block;
        background-color: #f2c202;
        color: #ef4444;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 700;
        transition: background 0.2s;
      }

      .btn-kembali:hover {
        background-color: #d2a902;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <h1>404</h1>
      <h2>Halaman Tidak Ditemukan</h2>
      <p>Maaf, halaman yang Anda tuju tidak ada atau tidak dapat diakses.</p>
      <a href="/" class="btn-kembali">Kembali ke Kasir</a>
    </div>
  </body>
</html>
