<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Transaksi - POS Bakso Tyga Sapi</title>
    <link
      rel="stylesheet"
      th:href="@{/css/index.css}"
      href="../static/css/index.css"
    />
    <link
      rel="stylesheet"
      th:href="@{/css/LaporanTransaksi.css}"
      href="../static/css/LaporanTransaksi.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <!-- 1. SINKRONISASI NAVBAR MENGGUNAKAN TEMPLATE FRAGMENT -->
    <!-- Mengganti navbar manual dengan fragment 'navbar' dari file fragments/navbar.html -->
    <div th:replace="~{fragments/navbar :: app-navbar('laporan')}"></div>
    <main class="laporan-container">
      <section class="laporan-header">
        <h2 id="judulLaporan">Membuat Laporan...</h2>
        <div class="filter-area">
          <select
            class="input-select"
            id="periodeLaporan"
            onchange="ubahPeriodeData()"
          >
            <option value="mingguan">Laporan Minggu Ini</option>
            <option value="harian">Laporan Hari Ini</option>
          </select>
          <button class="btn-cetak">Ekspor PDF</button>
        </div>
      </section>

      <section class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Total Transaksi</span>
          <span class="stat-value" id="angkaTransaksi">-</span>
        </div>
        <div class="stat-card highlight">
          <span class="stat-label">Total Pendapatan</span>
          <span class="stat-value" id="angkaPendapatan">Rp 0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label" id="judulTopMenu">5 Menu Terlaris</span>
          <ul class="top-menu-list" id="daftarTopMenu"></ul>
        </div>
      </section>

      <section class="chart-section">
        <h3 id="judulGrafik">Grafik Tren Penjualan</h3>
        <div class="chart-container">
          <canvas id="grafikPenjualan"></canvas>
        </div>
      </section>

      <section class="table-section">
        <h3 id="judulTabel">Riwayat Transaksi Terkini</h3>
        <table class="laporan-table">
          <thead>
            <tr>
              <th>ID Transaksi</th>
              <th>Waktu</th>
              <th>Detail Pesanan</th>
              <th>Total Bayar</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tabelRiwayat"></tbody>
        </table>
      </section>
    </main>

    <script>
      let chartInstance = null;

      // 2. LOGIKA RENDER GRAFIK CHART.JS
      function renderGrafik(grafikData) {
        const ctx = document.getElementById("grafikPenjualan").getContext("2d");
        if (chartInstance != null) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: grafikData.labels,
            datasets: [
              {
                label: grafikData.label,
                data: grafikData.data,
                backgroundColor: "#ffcc00",
                borderColor: "#b30000",
                borderWidth: 1,
                borderRadius: 5,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: (value) =>
                    value >= 1000000
                      ? "Rp " + value / 1000000 + " Jt"
                      : "Rp " + value / 1000 + " Rb",
                },
              },
            },
            plugins: { legend: { display: false } },
          },
        });
      }

      // 3. LOGIKA AMBIL DATA DARI BACKEND DATABASE (AJAX FETCH)
      function ubahPeriodeData() {
        const periode = document.getElementById("periodeLaporan").value;

        // Tembak ke endpoint LaporanController yang baru dipisah
        fetch(`/laporan/api?periode=${periode}`)
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("judulLaporan").innerText = data.judul;
            document.getElementById("angkaTransaksi").innerText =
              data.totalTransaksi;
            document.getElementById("angkaPendapatan").innerText =
              data.totalPendapatan;
            document.getElementById("judulTopMenu").innerText =
              data.topMenuJudul;

            document.getElementById("daftarTopMenu").innerHTML =
              data.topMenu.join("");

            document.getElementById("judulTabel").innerText = data.judulTabel;

            // FIX
            document.getElementById("tabelRiwayat").innerHTML =
              data.tabel.join("");

            document.getElementById("judulGrafik").innerText = data.judulGrafik;

            renderGrafik(data.grafik);
          })
          .catch((error) => {
            console.error("Gagal memuat data laporan:", error);
          });
      }
      // Load data otomatis saat pertama kali halaman terbuka
      document.addEventListener("DOMContentLoaded", ubahPeriodeData);
    </script>
  </body>
</html>
